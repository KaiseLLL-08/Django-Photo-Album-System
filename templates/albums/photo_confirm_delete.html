{% extends 'base.html' %}
{% block title %}Delete Photo{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 text-center">
            <h3 class="text-danger">⚠️ Delete Photo</h3>
            <p>Delete <strong>{{ object.title }}</strong>?</p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger me-2">Yes, Delete</button>
                <a href="{% url 'album-detail' object.album.pk %}" class="btn btn-outline-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
