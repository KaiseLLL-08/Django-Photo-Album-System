{% extends 'base.html' %}

{% block title %}Home — PhotoAlbum{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="display-4 fw-bold">📸 PhotoAlbum</h1>
    <p class="lead text-muted">Organize, store, and share your memories.</p>
    {% if user.is_authenticated %}
        <a href="{% url 'album-list' %}" class="btn btn-dark btn-lg">
            <i class="bi bi-collection"></i> Go to My Albums
        </a>
    {% else %}
        <a href="{% url 'register' %}" class="btn btn-dark btn-lg me-2">Get Started</a>
        <a href="{% url 'login' %}" class="btn btn-outline-dark btn-lg">Login</a>
    {% endif %}
</div>
{% endblock %}
